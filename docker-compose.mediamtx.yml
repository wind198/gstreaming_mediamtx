services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: fleet_mediamtx_dev
    restart: unless-stopped
    ports:
      - '8888:8888' # API
      - '8889:8889' # WebRTC / WHIP
      - '1935:1935' # RTMP
      - '8554:8554' # RTSP
      - '8188:8188' # WebRTC ICE/TCP
      - '8189:8189/udp' # WebRTC ICE/UDP
      - '8000:8000/udp' # RTP
      - '8001:8001/udp' # RTCP
      - '8890:8890/udp' # SRT
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    command: ['/mediamtx.yml']

  # Default: Rust + GStreamer WHIP (`/app/whip-publish`). Do not enable `publish-cpp` on the same STREAM_NAME.
  whip_video:
    profiles:
      - publish
      - publish-stable
    build:
      context: .
      dockerfile: Dockerfile.rust_gstreamer
    image: whip_gstreamer:local
    restart: unless-stopped
    depends_on:
      mediamtx:
        condition: service_started
    volumes:
      - ./test.mp4:/media/video.mp4:ro
    environment:
      VIDEO_PATH: /media/video.mp4
      STREAM_NAME: live
      MEDIAMTX_WHIP_BASE: http://mediamtx:8889
      SCALE_WIDTH: '1280'
      SCALE_HEIGHT: '720'
      FPS: '30'
      WHIP_VIDEO_CAPS: video/x-vp8
    command: ['/app/whip-publish']

  # C++ WHIP publisher (GStreamer). Profile `publish-cpp` only — do not run alongside `whip_video`
  # (also WHIP) on the same STREAM_NAME (e.g. both publishing `live`).
  whip_publish_cpp:
    profiles:
      - publish-cpp
    build:
      context: .
      dockerfile: Dockerfile.cpp_whip
    image: whip_cpp_gstreamer:local
    restart: unless-stopped
    depends_on:
      mediamtx:
        condition: service_started
    volumes:
      - ./test.mp4:/media/video.mp4:ro
    environment:
      VIDEO_PATH: /media/video.mp4
      STREAM_NAME: live
      MEDIAMTX_WHIP_BASE: http://mediamtx:8889
      SCALE_WIDTH: '1280'
      SCALE_HEIGHT: '720'
      FPS: '30'
      WHIP_VIDEO_CAPS: video/x-vp8
    command: ['/app/whip-publish-cpp']
